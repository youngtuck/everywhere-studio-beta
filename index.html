<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IdeasOut — Out of your head and into the world</title>
    <meta name="description" content="Structured Intelligence for Thought Leaders. One idea, publication-ready. IdeasOut." />
    <!-- Open Graph -->
    <meta property="og:title" content="IdeasOut" />
    <meta property="og:description" content="Out of your head and into the world." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="IdeasOut - Out of your head and into the world" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Theme color for browser chrome -->
    <meta name="theme-color" content="#0D1B2A" />
    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IdeasOut" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- Windows PWA -->
    <meta name="msapplication-TileColor" content="#0D1B2A" />
    <!-- Prevent white flash on load -->
    <style>
      html { background-color: #111f88; }
      html, body, #root { transition: none !important; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:ital,wght@0,300;0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  </head>
  <body style="margin: 0;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
